name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - "public/release-notes-data/**"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: Deploy when provider version is unchanged; regenerate outputs from cached upstream assets
        type: boolean
        default: false
      force_refresh_upstream:
        description: Re-download release JSON assets and provider source, then deploy (implies force_deploy)
        type: boolean
        default: false
  schedule:
    - cron: '17 22 * * *' # once per day, 40 minutes after release-notes job (UTC)

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: true

      - name: Reset GitHub 60-Day Inactivity Clock
        run: |
          set -euo pipefail

          # Only commit on the first day of the month.
          if [ "$(date -u +%d)" != "01" ]; then
            echo "Skipping keep-alive heartbeat today; only runs on the 1st of the month."
            exit 0
          fi

          echo "First of the month detected. Creating keep-alive heartbeat..."

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p .automation
          date -u +"%Y-%m-%dT%H:%M:%SZ" > .automation/keep_alive.txt

          git add .automation/keep_alive.txt

          if git diff --cached --quiet; then
            echo "No keep-alive changes to commit."
            exit 0
          fi

          git commit -m "chore: monthly keep-alive heartbeat [skip ci]"
          git push

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    outputs:
      needs_deploy: ${{ steps.check.outputs.needs_deploy }}

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: true
          # Site updates diffs github.event.before..github.sha; shallow clones miss the "before" commit.
          fetch-depth: 2

      - name: Restore versions cache
        id: cache
        uses: actions/cache@v6
        with:
          path: |
            public/dependency-tree-json
            public/resource-permissions-json
            public/resource-permissions-tf
            public/spreadsheet-templates
            public/supported-resources-templates
            public/lab-packages
            public/tf-export-resource-names
            public/tf-export-singletons
            public/schema-force-new
            public/tf-export-block-label-history.json
            public/gui-menu-paths.json
            .cache-meta
            .cache/provider-source
          key: versions-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            versions-${{ runner.os }}-${{ github.ref_name }}-
            versions-${{ runner.os }}-

      - name: Show restored cache state
        run: |
          set -euo pipefail
          echo "Cache hit: ${{ steps.cache.outputs.cache-hit }}"
          echo "--- .cache-meta ---"
          ls -la .cache-meta || true
          echo "--- public/dependency-tree-json (first 20) ---"
          ls -la public/dependency-tree-json | head -n 20 || true
          echo "--- public/resource-permissions-json (first 20) ---"
          ls -la public/resource-permissions-json | head -n 20 || true
          echo "--- public/resource-permissions-tf (first 20) ---"
          ls -la public/resource-permissions-tf | head -n 20 || true
          echo "--- public/spreadsheet-templates (first 20) ---"
          ls -la public/spreadsheet-templates | head -n 20 || true
          echo "--- public/supported-resources-templates (first 20) ---"
          ls -la public/supported-resources-templates | head -n 20 || true
          echo "--- latest.txt ---"
          cat .cache-meta/latest.txt || true
          echo "--- bootstrapped.txt ---"
          cat .cache-meta/bootstrapped.txt || true

      - name: Check latest release + decide what to do
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: MyPureCloud
          REPO: terraform-provider-genesyscloud
          EVENT_NAME: ${{ github.event_name }}
          FORCE_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && inputs.force_deploy && 'true' || 'false' }}
          FORCE_REFRESH: ${{ github.event_name == 'workflow_dispatch' && inputs.force_refresh_upstream && 'true' || 'false' }}
        run: |
          set -euo pipefail
          mkdir -p public/dependency-tree-json public/resource-permissions-json public/resource-permissions-tf public/tf-export-resource-names public/tf-export-singletons public/schema-force-new .cache-meta

          api_base="https://api.github.com/repos/${OWNER}/${REPO}"

          latest_tag="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_base}/releases/latest" | jq -r '.tag_name')"
          latest_ver="${latest_tag#v}"
          echo "Latest release: ${latest_tag} (${latest_ver})"

          prev_ver=""
          if [ -f ".cache-meta/latest.txt" ]; then
            prev_ver="$(cat .cache-meta/latest.txt || true)"
          fi

          bootstrapped="false"
          if [ -f ".cache-meta/bootstrapped.txt" ]; then
            bootstrapped="true"
          fi

          have_latest_json="false"
          if [ -f "public/dependency-tree-json/${latest_ver}.json" ]; then
            have_latest_json="true"
          fi

          needs_deploy="true"
          no_change="false"
          if [ "${bootstrapped}" = "true" ] && [ "${prev_ver}" = "${latest_ver}" ] && [ "${have_latest_json}" = "true" ]; then
            no_change="true"
          fi

          if [ "${EVENT_NAME}" = "push" ]; then
            echo "Push to main: forcing deploy (code changes may exist)."
          elif [ "${FORCE_REFRESH}" = "true" ]; then
            echo "Manual force refresh requested; bypassing no-change skip and re-downloading upstream assets."
          elif [ "${FORCE_DEPLOY}" = "true" ]; then
            echo "Manual force deploy requested; bypassing no-change skip."
          elif [ "${no_change}" = "true" ]; then
            needs_deploy="false"
            if [ "${EVENT_NAME}" = "schedule" ]; then
              echo "Scheduled run: no change (latest still ${latest_ver} and JSON present). Skipping."
            else
              echo "Manual run: no change (latest still ${latest_ver} and JSON present). Skipping. Check 'force_deploy' or 'force_refresh_upstream' to run anyway."
            fi
          else
            echo "Work needed. bootstrapped=${bootstrapped}, prev_ver='${prev_ver}', latest_ver='${latest_ver}', have_latest_json=${have_latest_json}"
          fi

          {
            echo "latest_ver=${latest_ver}"
            echo "latest_tag=${latest_tag}"
            echo "bootstrapped=${bootstrapped}"
            echo "needs_deploy=${needs_deploy}"
            echo "force_refresh=${FORCE_REFRESH}"
          } >> "${GITHUB_OUTPUT}"

      - name: Show deploy decision
        run: |
          set -euo pipefail
          echo "event=${{ github.event_name }}"
          echo "force_deploy=${{ github.event_name == 'workflow_dispatch' && inputs.force_deploy || 'n/a' }}"
          echo "force_refresh_upstream=${{ github.event_name == 'workflow_dispatch' && inputs.force_refresh_upstream || 'n/a' }}"
          echo "needs_deploy=${{ steps.check.outputs.needs_deploy }}"
          echo "force_refresh=${{ steps.check.outputs.force_refresh }}"
          echo "bootstrapped=${{ steps.check.outputs.bootstrapped }}"
          echo "latest_tag=${{ steps.check.outputs.latest_tag }}"
          echo "latest_ver=${{ steps.check.outputs.latest_ver }}"

      - name: Configure GitHub Pages
        if: steps.check.outputs.needs_deploy == 'true'
        uses: actions/configure-pages@v6

      - name: Clear provider source cache
        if: steps.check.outputs.needs_deploy == 'true' && steps.check.outputs.force_refresh == 'true'
        run: |
          set -euo pipefail
          echo "Clearing cached provider source tarballs..."
          rm -rf .cache/provider-source

      - name: Bootstrap dependency and permissions history
        if: steps.check.outputs.needs_deploy == 'true' && (steps.check.outputs.bootstrapped != 'true' || steps.check.outputs.force_refresh == 'true')
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: MyPureCloud
          REPO: terraform-provider-genesyscloud
          # Keep in sync with scripts/lib/public-data-path-constants.mjs
          MIN_DEP_VERSION: "1.60.0"
          MIN_PERM_VERSION: "1.76.0"
          FORCE_REFRESH: ${{ steps.check.outputs.force_refresh }}
        run: |
          set -euo pipefail
          mkdir -p public/dependency-tree-json public/resource-permissions-json public/resource-permissions-tf public/spreadsheet-templates public/supported-resources-templates public/tf-export-resource-names public/tf-export-singletons public/schema-force-new .cache-meta
          rm -f \
            public/dependency-tree-json/index.json \
            public/dependency-tree-json/latest.json \
            public/dependency-tree-json/latest-merged.json \
            public/resource-permissions-tf/latest-read-write-role.tf \
            public/resource-permissions-tf/latest-read-only-role.tf \
            public/spreadsheet-templates/latest-cx-as-code-template.xlsx \
            public/supported-resources-templates/latest-supported-resources.xlsx \
            public/dependency_tree.json \
            public/read-write-role.tf \
            public/read-only-role.tf

          api_base="https://api.github.com/repos/${OWNER}/${REPO}"
          page=1

          if [ "${FORCE_REFRESH}" = "true" ]; then
            echo "REFRESH: re-downloading dependency_tree JSONs >= ${MIN_DEP_VERSION}..."
            echo "REFRESH: re-downloading resource_permissions JSONs >= ${MIN_PERM_VERSION}..."
          else
            echo "BOOTSTRAP: downloading dependency_tree JSONs >= ${MIN_DEP_VERSION}..."
            echo "BOOTSTRAP: downloading resource_permissions JSONs >= ${MIN_PERM_VERSION}..."
          fi

          while true; do
            releases_json="$(curl -fsSL \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${api_base}/releases?per_page=100&page=${page}")"

            count="$(echo "${releases_json}" | jq 'length')"
            if [ "${count}" -eq 0 ]; then
              break
            fi

            echo "${releases_json}" | jq -r '
              .[] |
              { tag: .tag_name, assets: (.assets // []) } |
              .tag as $tag |
              ($tag | ltrimstr("v")) as $ver |
              [
                $tag,
                ((.assets[]? | select(.name == ("dependency_tree-" + $ver + ".json")) | .browser_download_url) // ""),
                ((.assets[]? | select(.name == ("resource_permissions-" + $ver + ".json")) | .browser_download_url) // "")
              ] |
              @tsv
            ' | while IFS=$'\t' read -r tag dep_url perm_url; do
              ver="${tag#v}"

              dep_first="$(printf "%s\n%s\n" "${MIN_DEP_VERSION}" "${ver}" | sort -V | head -n 1)"
              perm_first="$(printf "%s\n%s\n" "${MIN_PERM_VERSION}" "${ver}" | sort -V | head -n 1)"

              if [ -n "${dep_url}" ] && [ "${dep_first}" = "${MIN_DEP_VERSION}" ]; then
                dep_out="public/dependency-tree-json/${ver}.json"
                if [ "${FORCE_REFRESH}" = "true" ] || [ ! -f "${dep_out}" ]; then
                  echo "Downloading dependency tree ${ver} -> ${dep_out}"
                  curl -fsSL -L "${dep_url}" -o "${dep_out}"
                fi
              fi

              if [ -n "${perm_url}" ] && [ "${perm_first}" = "${MIN_PERM_VERSION}" ]; then
                perm_out="public/resource-permissions-json/${ver}.json"
                if [ "${FORCE_REFRESH}" = "true" ] || [ ! -f "${perm_out}" ]; then
                  echo "Downloading resource permissions ${ver} -> ${perm_out}"
                  curl -fsSL -L "${perm_url}" -o "${perm_out}"
                fi
              fi
            done

            page=$((page + 1))
          done

          if [ "$(find public/dependency-tree-json -maxdepth 1 -name '*.json' ! -name 'index.json' ! -name 'latest.json' | sed 's|.*/||; s|\.json$||' | grep -Ec '^[0-9]+\.[0-9]+\.[0-9]+$')" -eq 0 ]; then
            echo "Bootstrap failed: no dependency tree JSONs found. Check release assets and MIN_DEP_VERSION."
            exit 1
          fi

          versions_sorted="$(find public/dependency-tree-json -maxdepth 1 -name '*.json' ! -name 'index.json' ! -name 'latest.json' | sed 's|.*/||; s|\.json$||' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -Vr)"
          printf "%s\n" "${versions_sorted}" | jq -R -s 'split("\n") | map(select(length>0))' > public/dependency-tree-json/index.json

          latest="$(printf "%s\n" "${versions_sorted}" | head -n 1)"
          cp "public/dependency-tree-json/${latest}.json" public/dependency-tree-json/latest.json

          node scripts/generate-resource-permissions-tf.mjs --latest="${latest}"
          node scripts/generate-gui-menu-paths.mjs --latest="${latest}" --union-permissions
          node scripts/generate-tf-export-resource-names.mjs
          node scripts/generate-tf-export-singletons.mjs
          node scripts/generate-schema-force-new.mjs
          node scripts/verify-tf-export-env-vars.mjs

          echo "${latest}" > .cache-meta/latest.txt
          echo "true" > .cache-meta/bootstrapped.txt

      - name: Update latest version only
        if: steps.check.outputs.needs_deploy == 'true' && steps.check.outputs.bootstrapped == 'true' && steps.check.outputs.force_refresh != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: MyPureCloud
          REPO: terraform-provider-genesyscloud
        run: |
          set -euo pipefail
          mkdir -p public/dependency-tree-json public/resource-permissions-json public/resource-permissions-tf public/spreadsheet-templates public/supported-resources-templates public/tf-export-resource-names public/tf-export-singletons public/schema-force-new .cache-meta
          rm -f \
            public/dependency-tree-json/index.json \
            public/dependency-tree-json/latest.json \
            public/dependency-tree-json/latest-merged.json \
            public/resource-permissions-tf/latest-read-write-role.tf \
            public/resource-permissions-tf/latest-read-only-role.tf \
            public/spreadsheet-templates/latest-cx-as-code-template.xlsx \
            public/supported-resources-templates/latest-supported-resources.xlsx \
            public/dependency_tree.json \
            public/read-write-role.tf \
            public/read-only-role.tf

          api_base="https://api.github.com/repos/${OWNER}/${REPO}"
          latest_ver="${{ steps.check.outputs.latest_ver }}"

          echo "INCREMENTAL: ensuring latest (${latest_ver}) exists..."

          rel_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_base}/releases/latest")"

          dep_url="$(echo "${rel_json}" | jq -r --arg ver "${latest_ver}" '
            (.assets // [])
            | map(select(.name == ("dependency_tree-" + $ver + ".json")))
            | .[0].browser_download_url // empty
          ')"

          perm_url="$(echo "${rel_json}" | jq -r --arg ver "${latest_ver}" '
            (.assets // [])
            | map(select(.name == ("resource_permissions-" + $ver + ".json")))
            | .[0].browser_download_url // empty
          ')"

          if [ -z "${dep_url}" ]; then
            echo "Could not find dependency_tree-*.json asset in latest release."
            exit 1
          fi

          dep_out="public/dependency-tree-json/${latest_ver}.json"
          if [ ! -f "${dep_out}" ]; then
            echo "Downloading latest dependency tree -> ${dep_out}"
            curl -fsSL -L "${dep_url}" -o "${dep_out}"
          else
            echo "Already have ${dep_out}; not downloading."
          fi

          if [ -n "${perm_url}" ]; then
            perm_out="public/resource-permissions-json/${latest_ver}.json"
            if [ ! -f "${perm_out}" ]; then
              echo "Downloading latest resource permissions -> ${perm_out}"
              curl -fsSL -L "${perm_url}" -o "${perm_out}"
            else
              echo "Already have ${perm_out}; not downloading."
            fi
          fi

          versions_sorted="$(find public/dependency-tree-json -maxdepth 1 -name '*.json' ! -name 'index.json' ! -name 'latest.json' | sed 's|.*/||; s|\.json$||' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | sort -Vr)"
          printf "%s\n" "${versions_sorted}" | jq -R -s 'split("\n") | map(select(length>0))' > public/dependency-tree-json/index.json

          latest="$(printf "%s\n" "${versions_sorted}" | head -n 1)"
          cp "public/dependency-tree-json/${latest}.json" public/dependency-tree-json/latest.json

          node scripts/generate-resource-permissions-tf.mjs --latest="${latest}"
          node scripts/generate-gui-menu-paths.mjs --latest="${latest}" --union-permissions
          node scripts/generate-tf-export-resource-names.mjs
          node scripts/generate-tf-export-singletons.mjs
          node scripts/generate-schema-force-new.mjs
          node scripts/verify-tf-export-env-vars.mjs

          echo "${latest}" > .cache-meta/latest.txt

      - uses: actions/setup-node@v6
        if: steps.check.outputs.needs_deploy == 'true'
        with:
          node-version: 20
          cache: npm

      - run: npm ci
        if: steps.check.outputs.needs_deploy == 'true'

      - name: Fetch push range for site updates
        if: steps.check.outputs.needs_deploy == 'true' && github.event_name == 'push'
        run: |
          set -euo pipefail
          before="${{ github.event.before }}"
          if [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ]; then
            git fetch --depth=1 origin "$before" || true
          fi
          git fetch --depth=2 origin HEAD || true

      - name: Generate site updates from merged changes
        if: steps.check.outputs.needs_deploy == 'true' && github.event_name == 'push'
        env:
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/generate-site-updates.mjs

      - name: Commit auto-generated site updates
        if: steps.check.outputs.needs_deploy == 'true' && github.event_name == 'push'
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/site-updates-data/

          if git diff --cached --quiet; then
            echo "No site updates changes to commit."
            exit 0
          fi

          git commit -m "chore(site-updates): auto-update from merged changes [skip ci]"
          git push

      - name: Generate spreadsheet templates
        if: steps.check.outputs.needs_deploy == 'true'
        env:
          FORCE_DEPLOY: ${{ github.event_name == 'workflow_dispatch' && inputs.force_deploy && 'true' || 'false' }}
        run: |
          set -euo pipefail
          latest="$(cat .cache-meta/latest.txt)"
          # Incremental: skip cached versions when inputs unchanged.
          # force_deploy / force_refresh adds --force to rebuild every cached version.
          artifact_flags="--incremental"
          if [ "${{ steps.check.outputs.force_refresh }}" = "true" ] || [ "${FORCE_DEPLOY}" = "true" ]; then
            artifact_flags="--incremental --force"
          fi
          node scripts/generate-spreadsheet-template.mjs --latest="${latest}" ${artifact_flags}
          node scripts/generate-supported-resources-spreadsheet.mjs --latest="${latest}" ${artifact_flags}
          node scripts/generate-lab-package.mjs --latest="${latest}" ${artifact_flags}

      - run: npm run build
        if: steps.check.outputs.needs_deploy == 'true'

      - name: Verify provider environment variables
        if: steps.check.outputs.needs_deploy == 'true'
        run: node scripts/verify-tf-export-env-vars.mjs

      - uses: actions/upload-pages-artifact@v5
        if: steps.check.outputs.needs_deploy == 'true'
        with:
          path: dist

  deploy:
    needs: build
    if: needs.build.result == 'success' && needs.build.outputs.needs_deploy == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
